services:
  - type: web
    name: mongolia-drug-intel
    env: node
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: node dist/server.cjs
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DEEPSEEK_API_KEY
        sync: false

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蒙古国涉毒新闻情报系统 v4.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-bottom: 2px solid #334155; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .header h1 { font-size: 1.5em; color: #f1f5f9; }
        .header .subtitle { font-size: 0.85em; color: #94a3b8; margin-top: 4px; }
        .stats-bar { display: flex; gap: 24px; flex-wrap: wrap; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.8em; font-weight: bold; color: #38bdf8; }
        .stat-label { font-size: 0.75em; color: #94a3b8; }
        .container { max-width: 1500px; margin: 0 auto; padding: 24px 40px; }
        .controls { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .controls input, .controls select { padding: 10px 16px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; font-size: 0.9em; min-width: 160px; }
        .controls input::placeholder { color: #64748b; }
        .controls input:focus, .controls select:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56,189,248,0.15); }
        .btn { padding: 10px 24px; border-radius: 8px; border: none; font-size: 0.9em; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-search { background: #38bdf8; color: #0f172a; }
        .btn-search:hover { background: #0ea5e9; }
        .btn-crawl { background: #10b981; color: #fff; }
        .btn-crawl:hover { background: #059669; }
        .btn-crawl:disabled { background: #475569; cursor: not-allowed; }
        .btn-stop { background: #ef4444; color: #fff; display: none; }
        .btn-stop:hover { background: #dc2626; }
        .btn-stop.active { display: inline-block; }
        .btn-reset { background: #475569; color: #e2e8f0; }
        .btn-reset:hover { background: #64748b; }
        .progress-bar { background: #334155; border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; display: none; align-items: center; gap: 12px; }
        .progress-bar.active { display: flex; }
        .spinner { width: 20px; height: 20px; border: 3px solid #475569; border-top-color: #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .progress-text { color: #94a3b8; font-size: 0.9em; flex: 1; }
        .articles-list { display: flex; flex-direction: column; gap: 12px; }
        .article-card { background: #1e293b; border-radius: 10px; padding: 18px 22px; animation: fadeIn 0.3s ease; border-left: 3px solid #334155; }
        .article-card:hover { border-left-color: #38bdf8; background: #1e293bcc; }
        .article-title-orig { font-size: 1.05em; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; line-height: 1.4; }
        .article-title-cn { font-size: 0.95em; color: #fbbf24; margin-bottom: 4px; line-height: 1.4; }
        .article-title-cn::before { content: "🇨🇳 "; font-size: 0.8em; }
        .article-summary { font-size: 0.85em; color: #94a3b8; margin: 6px 0; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .article-summary-cn { font-size: 0.83em; color: #cbd5e1; margin: 2px 0 6px 0; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .article-summary-cn::before { content: "摘要: "; color: #64748b; font-size: 0.85em; }
        .article-meta { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 8px; font-size: 0.8em; color: #64748b; }
        .article-meta span { display: inline-flex; align-items: center; gap: 4px; }
        .lang-tag { padding: 2px 8px; border-radius: 4px; font-size: 0.75em; font-weight: 600; }
        .lang-mn { background: #7c3aed20; color: #a78bfa; }
        .lang-zh { background: #ef444420; color: #f87171; }
        .lang-en { background: #10b98120; color: #34d399; }
        .source-link { color: #38bdf8; text-decoration: none; font-weight: 600; }
        .source-link:hover { text-decoration: underline; }
        .site-label { background: #334155; padding: 2px 8px; border-radius: 4px; color: #e2e8f0; }
        .empty-state { text-align: center; padding: 60px 20px; color: #64748b; }
        .empty-state .icon { font-size: 3em; margin-bottom: 16px; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 12px; padding: 20px; }
        .pagination button { padding: 8px 16px; border-radius: 6px; border: 1px solid #475569; background: #1e293b; color: #e2e8f0; cursor: pointer; }
        .pagination button:hover { background: #334155; }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        .pagination span { color: #94a3b8; font-size: 0.9em; }
        @media (max-width: 768px) {
            .header, .container { padding: 16px; }
            .controls { flex-direction: column; }
            .controls input, .controls select { width: 100%; min-width: auto; }
            .stats-bar { gap: 12px; }
            .stat-value { font-size: 1.3em; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>蒙古国涉毒新闻情报系统 v4.0</h1>
            <div class="subtitle">Mongolia Drug Intelligence — 19 站点 · AI智能识别 · 30日时效 · 排除医药误报 · 双语显示</div>
        </div>
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">情报总数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-mn">0</div>
                <div class="stat-label">蒙语</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-zh">0</div>
                <div class="stat-label">中文</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-en">0</div>
                <div class="stat-label">英语</div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="progress-bar" id="progress-bar">
            <div class="spinner"></div>
            <div class="progress-text" id="progress-text">正在初始化采集...</div>
        </div>

        <div class="controls">
            <input type="text" id="search-keyword" placeholder="关键词搜索..." onkeydown="if(event.key==='Enter')searchIntel()">
            <select id="search-language">
                <option value="">全部语种</option>
                <option value="mn">蒙语</option>
                <option value="zh">中文</option>
                <option value="en">英语</option>
            </select>
            <input type="date" id="search-start-date">
            <input type="date" id="search-end-date">
            <button class="btn btn-search" onclick="searchIntel()">搜索</button>
            <button class="btn btn-reset" onclick="resetSearch()">重置</button>
            <button class="btn btn-crawl" id="btn-crawl" onclick="startCrawl()">开始采集</button>
            <button class="btn btn-stop" id="btn-stop" onclick="stopCrawl()">停止采集</button>
        </div>

        <div class="articles-list" id="articles-list"></div>

        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        let currentPage = 1;
        const PAGE_SIZE = 30;
        let eventSource = null;
        let liveCount = 0;
        let isLiveCrawl = false;
        const langLabels = { mn: '蒙语', zh: '中文', en: '英语' };

        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            searchIntel();
            checkCrawlStatus();
        });

        async function loadStats() {
            try {
                const resp = await fetch('/api/stats');
                const stats = await resp.json();
                document.getElementById('stat-total').textContent = stats.total || 0;
                const byLang = stats.by_language || {};
                document.getElementById('stat-mn').textContent = byLang.mn || 0;
                document.getElementById('stat-zh').textContent = byLang.zh || 0;
                document.getElementById('stat-en').textContent = byLang.en || 0;
            } catch (e) {}
        }

        async function searchIntel(page = 1) {
            if (isLiveCrawl) return;
            currentPage = page;
            const params = new URLSearchParams();
            const keyword = document.getElementById('search-keyword').value.trim();
            const language = document.getElementById('search-language').value;
            const startDate = document.getElementById('search-start-date').value;
            const endDate = document.getElementById('search-end-date').value;
            if (keyword) params.set('keyword', keyword);
            if (language) params.set('language', language);
            if (startDate) params.set('start_date', startDate);
            if (endDate) params.set('end_date', endDate);
            params.set('limit', String(PAGE_SIZE));
            params.set('offset', String((page - 1) * PAGE_SIZE));

            try {
                const resp = await fetch(`/api/intel?${params.toString()}`);
                const data = await resp.json();
                renderArticles(data.results || []);
                renderPagination(data.total || 0, page);
            } catch (e) {
                document.getElementById('articles-list').innerHTML =
                    '<div class="empty-state"><div>搜索出错，请重试</div></div>';
            }
        }

        function renderArticleCard(item) {
            const title = escapeHtml(item.news_title || '(无标题)');
            const cnTitle = escapeHtml(item.cn_title || '');
            const summary = escapeHtml((item.content_summary || '').substring(0, 200));
            const cnSummary = escapeHtml((item.cn_summary || '').substring(0, 200));
            const time = escapeHtml(item.publish_time || '');
            const source = escapeHtml(item.source_name || '');
            const lang = item.language || '';
            const langLabel = langLabels[lang] || lang;
            const url = escapeHtml(item.source_url || '#');
            const category = escapeHtml(item.site_category || '');

            // 只有当翻译和原文不同时才显示中文标题
            const showCnTitle = cnTitle && cnTitle !== title;
            const showCnSummary = cnSummary && cnSummary !== summary;

            return `<div class="article-card">
                <div class="article-title-orig">${title}</div>
                ${showCnTitle ? `<div class="article-title-cn">${cnTitle}</div>` : ''}
                ${summary ? `<div class="article-summary">${summary}</div>` : ''}
                ${showCnSummary ? `<div class="article-summary-cn">${cnSummary}</div>` : ''}
                <div class="article-meta">
                    <span class="site-label">${source}</span>
                    ${category ? `<span>${category}</span>` : ''}
                    <span>${time || '日期未知'}</span>
                    <span class="lang-tag lang-${lang}">${langLabel}</span>
                    <a class="source-link" href="${url}" target="_blank" rel="noopener">查看原文 →</a>
                </div>
            </div>`;
        }

        function renderArticles(results) {
            const container = document.getElementById('articles-list');
            if (!results || results.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>无匹配数据 — 尝试其他关键词或先执行采集</div></div>';
                return;
            }
            container.innerHTML = results.map(renderArticleCard).join('');
        }

        function prependArticle(item) {
            const container = document.getElementById('articles-list');
            const empty = container.querySelector('.empty-state');
            if (empty) container.innerHTML = '';
            container.insertAdjacentHTML('afterbegin', renderArticleCard(item));
            while (container.children.length > 200) {
                container.removeChild(container.lastChild);
            }
            liveCount++;
            document.getElementById('stat-total').textContent = parseInt(document.getElementById('stat-total').textContent || 0) + 1;
            const langMap = { mn: 'stat-mn', zh: 'stat-zh', en: 'stat-en' };
            if (langMap[item.language]) {
                const el = document.getElementById(langMap[item.language]);
                el.textContent = parseInt(el.textContent || 0) + 1;
            }
        }

        function renderPagination(total, page) {
            const totalPages = Math.ceil(total / PAGE_SIZE);
            const pag = document.getElementById('pagination');
            if (totalPages <= 1) {
                pag.innerHTML = total > 0 ? `<span>共 ${total} 条记录</span>` : '';
                return;
            }
            pag.innerHTML = `
                <button onclick="searchIntel(${page - 1})" ${page <= 1 ? 'disabled' : ''}>上一页</button>
                <span>第 ${page} / ${totalPages} 页 (共 ${total} 条)</span>
                <button onclick="searchIntel(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>下一页</button>
            `;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        function resetSearch() {
            document.getElementById('search-keyword').value = '';
            document.getElementById('search-language').value = '';
            document.getElementById('search-start-date').value = '';
            document.getElementById('search-end-date').value = '';
            searchIntel(1);
        }

        // ============================================================
        // SSE 实时采集
        // ============================================================

        function startCrawl() {
            if (isLiveCrawl) return;

            const btn = document.getElementById('btn-crawl');
            const stopBtn = document.getElementById('btn-stop');
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');

            btn.disabled = true;
            btn.textContent = '采集中...';
            stopBtn.classList.add('active');
            progressBar.classList.add('active');
            progressText.textContent = '正在连接...';
            liveCount = 0;
            isLiveCrawl = true;

            // 在顶部插入状态提示
            const container = document.getElementById('articles-list');
            container.innerHTML = `<div class="empty-state">
                <div class="icon">⏳</div>
                <div>实时采集中... 已获取 <strong id="live-counter">0</strong> 条情报</div>
            </div>`;

            eventSource = new EventSource('/api/crawl/stream');

            eventSource.addEventListener('article', function(e) {
                try {
                    const item = JSON.parse(e.data);
                    prependArticle(item);
                    const counter = document.getElementById('live-counter');
                    if (counter) counter.textContent = liveCount;
                    progressText.textContent = `实时采集: 已获取 ${liveCount} 条情报`;
                } catch (err) {}
            });

            eventSource.addEventListener('progress', function(e) {
                try {
                    const data = JSON.parse(e.data);
                    progressText.textContent = data.msg || progressText.textContent;
                } catch (err) {}
            });

            eventSource.addEventListener('done', function(e) {
                try {
                    const data = JSON.parse(e.data);
                    progressText.textContent = `采集完成！共获取 ${data.total_articles || liveCount} 条情报`;
                } catch (err) {
                    progressText.textContent = `采集完成！共获取 ${liveCount} 条情报`;
                }
                finishCrawl();
            });

            eventSource.addEventListener('error', function(e) {
                try {
                    const data = JSON.parse(e.data);
                    progressText.textContent = data.message || '采集出错';
                } catch (err) {}
                finishCrawl();
            });

            eventSource.onerror = function(e) {
                if (isLiveCrawl) {
                    progressText.textContent = liveCount > 0 ? `采集中断，已获取 ${liveCount} 条` : '连接失败';
                    finishCrawl();
                }
            };
        }

        function stopCrawl() {
            fetch('/api/crawl/stop', { method: 'POST' });
            if (eventSource) eventSource.close();
            finishCrawl();
            document.getElementById('progress-text').textContent = '采集已手动停止';
        }

        function finishCrawl() {
            isLiveCrawl = false;
            if (eventSource) { eventSource.close(); eventSource = null; }
            document.getElementById('btn-crawl').disabled = false;
            document.getElementById('btn-crawl').textContent = '开始采集';
            document.getElementById('btn-stop').classList.remove('active');
            setTimeout(() => {
                document.getElementById('progress-bar').classList.remove('active');
                loadStats();
            }, 3000);
        }

        async function checkCrawlStatus() {
            try {
                const resp = await fetch('/api/crawl/status');
                const status = await resp.json();
                if (status.running) {
                    isLiveCrawl = true;
                    document.getElementById('progress-bar').classList.add('active');
                    document.getElementById('progress-text').textContent = status.progress || '采集中...';
                    document.getElementById('btn-crawl').disabled = true;
                    document.getElementById('btn-stop').classList.add('active');
                    const interval = setInterval(async () => {
                        try {
                            const r = await fetch('/api/crawl/status');
                            const s = await r.json();
                            document.getElementById('progress-text').textContent = s.progress || '';
                            if (!s.running) {
                                clearInterval(interval);
                                finishCrawl();
                                searchIntel();
                            }
                        } catch (e) { clearInterval(interval); }
                    }, 3000);
                }
            } catch (e) {}
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蒙古国涉毒新闻情报系统 v7.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-bottom: 2px solid #334155; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .header h1 { font-size: 1.5em; color: #f1f5f9; }
        .header .subtitle { font-size: 0.85em; color: #94a3b8; margin-top: 4px; }
        .container { max-width: 1500px; margin: 0 auto; padding: 24px 40px; }
        .controls { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .controls input, .controls select { padding: 10px 16px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; font-size: 0.9em; min-width: 160px; }
        .controls input::placeholder { color: #64748b; }
        .controls input:focus, .controls select:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56,189,248,0.15); }
        .btn { padding: 10px 24px; border-radius: 8px; border: none; font-size: 0.9em; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-search { background: #38bdf8; color: #0f172a; }
        .btn-search:hover { background: #0ea5e9; }
        .btn-crawl { background: #10b981; color: #fff; }
        .btn-crawl:hover { background: #059669; }
        .btn-crawl:disabled { background: #475569; cursor: not-allowed; }
        .btn-stop { background: #ef4444; color: #fff; display: none; }
        .btn-stop:hover { background: #dc2626; }
        .btn-stop.active { display: inline-block; }
        .btn-reset { background: #475569; color: #e2e8f0; }
        .btn-reset:hover { background: #64748b; }
        .progress-bar { background: #334155; border-radius: 8px; padding: 16px; margin-bottom: 20px; display: none; }
        .progress-bar.active { display: block; }
        .spinner { width: 20px; height: 20px; border: 3px solid #475569; border-top-color: #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .progress-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .progress-text { color: #94a3b8; font-size: 0.9em; flex: 1; }
        .progress-live-count { margin-top: 10px; font-size: 0.85em; color: #fbbf24; }
        .progress-live-count strong { font-size: 1.2em; }
        .progress-detail { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .progress-site { background: #1e3a5f; color: #38bdf8; padding: 2px 8px; border-radius: 4px; font-size: 0.75em; }
        .progress-site.done { background: #1a3a2a; color: #34d399; }
        .articles-list { display: flex; flex-direction: column; gap: 12px; }
        .article-card { background: #1e293b; border-radius: 10px; padding: 18px 22px; animation: fadeIn 0.3s ease; border-left: 3px solid #334155; }
        .article-card:hover { border-left-color: #38bdf8; background: #1e293bcc; }
        .article-title-orig { font-size: 1.05em; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; line-height: 1.4; }
        .article-title-cn { font-size: 0.95em; color: #fbbf24; margin-bottom: 4px; line-height: 1.4; }
        .article-title-cn::before { content: "CN "; font-size: 0.8em; }
        .article-summary { font-size: 0.85em; color: #94a3b8; margin: 6px 0; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .article-summary-cn { font-size: 0.83em; color: #cbd5e1; margin: 2px 0 6px 0; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .article-summary-cn::before { content: "摘要: "; color: #64748b; font-size: 0.85em; }
        .article-meta { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 8px; font-size: 0.8em; color: #64748b; }
        .article-meta span { display: inline-flex; align-items: center; gap: 4px; }
        .lang-tag { padding: 2px 8px; border-radius: 4px; font-size: 0.75em; font-weight: 600; }
        .lang-mn { background: #7c3aed20; color: #a78bfa; }
        .lang-zh { background: #ef444420; color: #f87171; }
        .lang-en { background: #10b98120; color: #34d399; }
        .source-link { color: #38bdf8; text-decoration: none; font-weight: 600; }
        .source-link:hover { text-decoration: underline; }
        .site-label { background: #334155; padding: 2px 8px; border-radius: 4px; color: #e2e8f0; }
        .empty-state { text-align: center; padding: 60px 20px; color: #64748b; }
        .empty-state .icon { font-size: 3em; margin-bottom: 16px; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 12px; padding: 20px; }
        .pagination button { padding: 8px 16px; border-radius: 6px; border: 1px solid #475569; background: #1e293b; color: #e2e8f0; cursor: pointer; }
        .pagination button:hover { background: #334155; }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        .pagination span { color: #94a3b8; font-size: 0.9em; }
        @media (max-width: 768px) {
            .header, .container { padding: 16px; }
            .controls { flex-direction: column; }
            .controls input, .controls select { width: 100%; min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>蒙古国涉毒新闻情报系统 v7.0</h1>
            <div class="subtitle">Mongolia Drug Intelligence — 19 站点 · SSE 实时流式采集 · 三语种</div>
        </div>
    </div>

    <div class="container">
        <div class="progress-bar" id="progress-bar">
            <div class="progress-header">
                <div class="spinner"></div>
                <div class="progress-text" id="progress-text">正在初始化采集...</div>
            </div>
            <div class="progress-live-count" id="progress-live-count"></div>
            <div class="progress-detail" id="progress-detail"></div>
        </div>

        <div class="controls">
            <input type="text" id="search-keyword" placeholder="关键词搜索..." onkeydown="if(event.key==='Enter')searchIntel()">
            <select id="search-language">
                <option value="">全部语种</option>
                <option value="mn">蒙语</option>
                <option value="zh">中文</option>
                <option value="en">英语</option>
            </select>
            <input type="date" id="search-start-date">
            <input type="date" id="search-end-date">
            <button class="btn btn-search" onclick="searchIntel()">搜索</button>
            <button class="btn btn-reset" onclick="resetSearch()">重置</button>
            <button class="btn btn-crawl" id="btn-crawl" onclick="startCrawl()">开始采集</button>
            <button class="btn btn-stop" id="btn-stop" onclick="stopCrawl()">停止采集</button>
        </div>

        <div class="articles-list" id="articles-list"></div>
        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        const ADMIN_TOKEN = '{{ admin_token }}';
        const langLabels = { mn: '蒙语', zh: '中文', en: '英语' };
        let articlesCache = [];
        let es = null;
        let isCrawling = false;
        let currentPage = 1;
        const PAGE_SIZE = 30;

        // ============================================================
        // SSE 流式采集
        // ============================================================

        function startCrawl() {
            if (isCrawling) return;
            isCrawling = true;
            articlesCache = [];

            const btn = document.getElementById('btn-crawl');
            const stopBtn = document.getElementById('btn-stop');
            const bar = document.getElementById('progress-bar');
            const pText = document.getElementById('progress-text');
            const pLive = document.getElementById('progress-live-count');
            const pDetail = document.getElementById('progress-detail');

            btn.disabled = true; btn.textContent = '采集中...';
            stopBtn.classList.add('active');
            bar.classList.add('active');
            document.getElementById('articles-list').innerHTML = '';
            pDetail.innerHTML = '';

            let url = '/api/crawl/stream';
            if (ADMIN_TOKEN) url += '?token=' + encodeURIComponent(ADMIN_TOKEN);

            es = new EventSource(url);
            pText.textContent = '连接中...';

            es.addEventListener('connected', function(e) {
                pText.textContent = '已连接，正在初始化...';
            });

            es.addEventListener('progress', function(e) {
                try {
                    const d = JSON.parse(e.data);
                    if (d.type === 'crawl_start') {
                        pText.textContent = '采集启动: ' + d.total_sites + ' 个站点';
                    } else if (d.type === 'phase') {
                        pText.textContent = d.msg || d.phase;
                    } else if (d.type === 'search_engine') {
                        pText.textContent = d.msg || 'RSS搜索中...';
                    } else if (d.type === 'search_progress') {
                        pText.textContent = d.msg || ('RSS检索: ' + d.current + '/' + d.total);
                        pLive.innerHTML = '已采集 <strong>' + (d.article_count || articlesCache.length) + '</strong> 条';
                    } else if (d.type === 'search_done') {
                        pText.textContent = 'RSS检索完成: ' + (d.total_urls || 0) + ' 条, 过滤后 ' + (d.filtered || articlesCache.length) + ' 条';
                        pLive.innerHTML = '已采集 <strong>' + articlesCache.length + '</strong> 条';
                } else if (d.type === 'site_detail') {
                        // montsame/see 采样进度
                        pText.textContent = d.site + ': ' + (d.msg || '');
                } else if (d.type === 'sampling_hit') {
                        pText.textContent = d.site + ': 采样命中! ' + (d.title || '');
                        pLive.innerHTML = '已采集 <strong>' + articlesCache.length + '</strong> 条';
                    } else if (d.type === 'site_start') {
                        pText.textContent = '正在采集: ' + d.site;
                    } else if (d.type === 'site_discovery') {
                        pText.textContent = d.site + ': 发现 ' + d.links + ' 个链接';
                    } else if (d.type === 'site_done') {
                        pText.textContent = d.site + ': 完成 ' + (d.articles || 0) + ' 篇';
                        const tag = document.createElement('span');
                        tag.className = 'progress-site done';
                        tag.textContent = d.site;
                        pDetail.appendChild(tag);
                    } else if (d.type === 'site_skip') {
                        pText.textContent = d.site + ': 跳过 (' + (d.reason || '') + ')';
                    } else if (d.type === 'batch_start') {
                        pText.textContent = '批次 ' + d.batch + '/' + d.total_batches + ': ' + (d.sites||[]).join(', ');
                    } else if (d.type === 'sampling_hit') {
                        pText.textContent = d.site + ': 采样命中! ' + (d.title || '');
                    } else if (d.type === 'crawl_done') {
                        pText.textContent = '采集完成! ' + d.total_articles + ' 篇文章';
                        pLive.innerHTML = '共采集 <strong>' + d.total_articles + '</strong> 条情报';
                    } else {
                        pText.textContent = e.data;
                    }
                } catch(ex) {}
            });

            es.addEventListener('article', function(e) {
                try {
                    const a = JSON.parse(e.data);
                    const u = a.source_url || '';
                    if (u && !articlesCache.some(x => x.source_url === u)) {
                        articlesCache.push(a);
                        prependArticle(a);
                        pLive.innerHTML = '已采集 <strong>' + articlesCache.length + '</strong> 条情报';
                    }
                } catch(ex) {}
            });

            es.addEventListener('translate', function(e) {
                try {
                    const t = JSON.parse(e.data);
                    const url = t.source_url || '';
                    const existing = articlesCache.find(x => x.source_url === url);
                    if (existing) {
                        if (t.cn_title) existing.cn_title = t.cn_title;
                        if (t.cn_summary) existing.cn_summary = t.cn_summary;
                        refreshArticleList();
                    }
                } catch(ex) {}
            });

            es.addEventListener('done', function(e) {
                try {
                    const d = JSON.parse(e.data);
                    pText.textContent = '采集完成! 共 ' + (d.total_articles || articlesCache.length) + ' 条情报';
                    pLive.innerHTML = '采集完成，共 <strong>' + articlesCache.length + '</strong> 条情报';
                } catch(ex) {}
                finishCrawl();
            });

            es.addEventListener('error', function(e) {
                try {
                    const d = JSON.parse(e.data);
                    pText.textContent = '错误: ' + (d.message || '');
                } catch(ex) {}
                finishCrawl();
            });

            es.onerror = function(e) {
                if (es.readyState === EventSource.CLOSED) {
                    pText.textContent = '连接已关闭';
                }
                finishCrawl();
            };
        }

        function stopCrawl() {
            if (es) { es.close(); es = null; }
            let url = '/api/crawl/stop';
            if (ADMIN_TOKEN) url += '?token=' + encodeURIComponent(ADMIN_TOKEN);
            fetch(url, { method: 'POST' }).catch(function(){});
            document.getElementById('progress-text').textContent = '采集已停止';
            finishCrawl();
        }

        function finishCrawl() {
            isCrawling = false;
            if (es) { es.close(); es = null; }
            const btn = document.getElementById('btn-crawl');
            btn.disabled = false; btn.textContent = '开始采集';
            document.getElementById('btn-stop').classList.remove('active');
            setTimeout(function() { document.getElementById('progress-bar').classList.remove('active'); }, 3000);
            searchIntel();
        }

        function prependArticle(item) {
            const c = document.getElementById('articles-list');
            if (c.querySelector('.empty-state')) c.innerHTML = '';
            c.insertAdjacentHTML('afterbegin', renderArticleCard(item));
            while (c.children.length > 500) c.removeChild(c.lastChild);
        }

        function refreshArticleList() {
            const kw = (document.getElementById('search-keyword').value || '').trim().toLowerCase();
            const lang = document.getElementById('search-language').value;
            const sd = document.getElementById('search-start-date').value;
            const ed = document.getElementById('search-end-date').value;
            let f = articlesCache.slice();
            if (kw) f = f.filter(a => [a.news_title||'', a.cn_title||'', a.content_summary||'', a.source_name||''].join(' ').toLowerCase().includes(kw));
            if (lang) f = f.filter(a => a.language === lang);
            if (sd || ed) {
                f = f.filter(a => {
                    const d = parseRssDate(a.publish_time);
                    if (!d) return true;
                    if (sd && d < new Date(sd + 'T00:00:00')) return false;
                    if (ed && d > new Date(ed + 'T23:59:59')) return false;
                    return true;
                });
            }
            f.sort((a, b) => parseRssDate(b.publish_time) - parseRssDate(a.publish_time));
            const start = (currentPage - 1) * PAGE_SIZE;
            renderArticles(f.slice(start, start + PAGE_SIZE));
            renderPagination(f.length, currentPage);
        }

        // ============================================================
        // 搜索 & 渲染
        // ============================================================

        function searchIntel(page) {
            page = page || 1;
            currentPage = page;
            refreshArticleList();
        }

        function parseRssDate(s) {
            if (!s) return 0;
            const d = new Date(s);
            return isNaN(d.getTime()) ? 0 : d.getTime();
        }

        function resetSearch() {
            document.getElementById('search-keyword').value = '';
            document.getElementById('search-language').value = '';
            document.getElementById('search-start-date').value = '';
            document.getElementById('search-end-date').value = '';
            searchIntel(1);
        }

        function renderArticleCard(item) {
            const t = esc(item.news_title || '(无标题)');
            const ct = esc(item.cn_title || '');
            const s = esc((item.content_summary || '').substring(0, 200));
            const cs = esc((item.cn_summary || '').substring(0, 200));
            const tm = esc(item.publish_time || '');
            const src = esc(item.source_name || '');
            const lang = item.language || '';
            const ll = langLabels[lang] || lang;
            const url = esc(item.source_url || '#');
            const cat = esc(item.site_category || '');
            const link = '<a class="source-link" href="' + url + '" target="_blank" rel="noopener">查看原文 &rarr;</a>';
            const showCt = ct && ct !== t;
            const showCs = cs && cs !== s;

            return '<div class="article-card">' +
                '<div class="article-title-orig">' + t + '</div>' +
                (showCt ? '<div class="article-title-cn">' + ct + '</div>' : '') +
                (s ? '<div class="article-summary">' + s + '</div>' : '') +
                (showCs ? '<div class="article-summary-cn">' + cs + '</div>' : '') +
                '<div class="article-meta">' +
                '<span class="site-label">' + src + '</span>' +
                (cat ? '<span>' + cat + '</span>' : '') +
                '<span>' + (tm || '未知日期') + '</span>' +
                '<span class="lang-tag lang-' + lang + '">' + ll + '</span>' +
                link + '</div></div>';
        }

        function renderArticles(results) {
            const c = document.getElementById('articles-list');
            if (!results || results.length === 0) {
                if (articlesCache.length === 0 && !isCrawling) {
                    c.innerHTML = '<div class="empty-state"><div class="icon">X</div><div>暂无数据 — 点击"开始采集"获取情报</div></div>';
                } else if (articlesCache.length > 0) {
                    c.innerHTML = '<div class="empty-state"><div class="icon">X</div><div>无匹配数据 — 尝试其他关键词</div></div>';
                }
                return;
            }
            c.innerHTML = results.map(renderArticleCard).join('');
        }

        function renderPagination(total, page) {
            const tp = Math.ceil(total / PAGE_SIZE);
            const p = document.getElementById('pagination');
            if (tp <= 1) { p.innerHTML = total > 0 ? '<span>共 ' + total + ' 条</span>' : ''; return; }
            p.innerHTML = '<button onclick="searchIntel(' + (page-1) + ')" ' + (page<=1?'disabled':'') + '>上一页</button>' +
                '<span>第 ' + page + ' / ' + tp + ' 页 (共 ' + total + ' 条)</span>' +
                '<button onclick="searchIntel(' + (page+1) + ')" ' + (page>=tp?'disabled':'') + '>下一页</button>';
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }
    </script>
</body>
</html>
